<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoScanMail</title>
    
    <link rel="icon" type="image/png" href="Logo.png"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white-translucent">
    <meta name="apple-mobile-web-app-title" content="AutoScan">

    <style>
        /* Thiết lập cơ bản cho toàn bộ trang */
        body {
            margin: 0;
            font-family: Arial;
            background: #f2f2f2;
        }

        /* Khung chứa nội dung chính */
        .container {
            width: 100%;
            max-width: 100%;
            padding: 12px;
            box-sizing: border-box;
        }

        /* Tiêu đề chính */
        h1 {
            text-align: center;
        }

        /* Định dạng chung cho tất cả các nút bấm */
        button {
            width: 95%;
            padding: 14px;
            margin: 8px auto;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: block;
        }

        /* Nút chức năng chính (Kiểm tra Gmail) */
        .main-btn {
            background: #2196F3;
            color: white;
            font-weight: bold;
        }

        /* Tiêu đề của mục chưa xử lý */
        .pending-header {
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }

        /* Từng mục nhỏ trong danh sách chờ */
        .pending-item {
            background: #90CAF9;
            color: #0D47A1;
            width: 90%;
            display: block;
            margin: 6px auto;
        }

        /* Tiêu đề của mục đã xử lý */
        .done-header {
            background: #FFC107;
            color: #333;
            font-weight: bold;
        }

        /* Từng mục nhỏ trong danh sách đã hoàn thành */
        .done-item {
            background: #e0e0e0;
            color: #555;
            width: 90%;
            display: block;
            margin: 6px auto;
        }

        /* Lớp ẩn phần tử */
        .hidden {
            display: none;
        }

        /* Thông báo trạng thái thành công */
        .success {
            text-align: center;
            margin: 10px 0;
            color: green;
            font-weight: bold;
        }

        /* Nút xóa dữ liệu */
        .delete-done-btn {
            background: #f44336;
            color: white;
            font-weight: bold;
        }

        /* ===== ĐỊNH DẠNG CỬA SỔ MODAL (XÁC NHẬN XÓA) ===== */
        
        /* Nền mờ của Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(2px);
        }

        /* Khi Modal ở trạng thái hiển thị */
        .modal.active {
            display: flex;
        }

        /* Hộp nội dung bên trong Modal */
        .modal-box {
            background: white;
            width: 95%;
            max-width: 500px;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Khung bao quanh ô nhập mật khẩu */
        .password-wrapper {
            position: relative;
        }
        
        /* Ô nhập liệu mật khẩu */
        .modal-box input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px !important;
            box-sizing: border-box;
        }

        /* Biểu tượng con mắt để ẩn/hiện mật khẩu */
        .eye-icon {
            position: absolute;
            right: 10px;
            top: 60%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }

        /* Khung chứa các nút hành động trong Modal */
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        /* Nút xác nhận xóa */
        .confirm-btn {
            background: #f44336;
            color: white;
            flex: 1;
            opacity: 0.5;
        }

        /* Nút xác nhận khi đã nhập mật khẩu */
        .confirm-btn.enabled {
            opacity: 1;
        }

        /* Nút hủy bỏ */
        .cancel-btn {
            background: #9e9e9e;
            color: white;
            flex: 1;
        }

        /* Chữ thông báo lỗi */
        .error-text {
            color: red;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Khóa cuộn trang khi mở Modal */
        body.modal-open {
            overflow: hidden;
        }

        .spinner {
          display: inline-block;
          width: 16px;
          height: 16px;
          border: 3px solid #ddd;
          border-top: 3px solid #333;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin-right: 6px;
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Auto Scan System</h1>
    <button class="main-btn" onclick="runProcess()">Kiểm Tra Gmail</button>
    <div id="summary" class="success"></div>
    
    <button id="pendingHeaderBtn" class="pending-header" onclick="toggleSection('pending')">
        Mục Chưa Xử Lý
    </button>
    <div id="pendingSection"></div>

    <button class="done-header" onclick="toggleSection('done')">
        Mục Đã Xử Lý
    </button>
    <div id="doneSection" class="hidden"></div>

    <button class="delete-done-btn" onclick="openModal()">
        Xóa Dữ Liệu Đã Xử Lý
    </button>
</div>

<div id="passwordModal" class="modal hidden" onclick="outsideClick(event)">
    <div class="modal-box">
        <h3>Xác nhận xóa dữ liệu</h3>
        <div style="position:relative;">
            <input type="password" id="modalPassword" placeholder="Nhập mật khẩu" oninput="checkInput()" onkeydown="handleEnter(event)">
            <span id="eyeIcon" onclick="togglePassword()" style="position:absolute; right:12px; top:60%; transform:translateY(-50%); cursor:pointer;">👁</span>
        </div>
        <div id="modalError" class="error-text"></div>
        <div class="modal-actions">
            <button id="confirmBtn" class="confirm-btn" onclick="confirmDelete()" disabled>Xác nhận</button>
            <button class="cancel-btn" onclick="closeModal()">Hủy</button>
        </div>
    </div>
</div>

<script>
    /* 🔥 Cấu hình API Google Script */
    const API_URL = "https://script.google.com/macros/s/AKfycbxoCQiMRZqGwJRXu1Avz3yoSO-BBbs_RcOl3sXpWOKgBJ1qQz5I_RisYkzoUX8juNIj/exec";

    /* Biến lưu trữ dữ liệu tạm thời */
    let pendingItems = [];
    let doneItems = [];

    /**
     * Hàm gọi API dùng chung
     */
    async function callAPI(action, data = {}) {
        data.action = action;
        try {
            let response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(data)
            });
            return await response.json();
        } catch (error) {
            console.error("Lỗi API:", error);
            return null;
        }
    }

    /* 1. TỰ ĐỘNG TẢI DỮ LIỆU KHI TRANG WEB MỞ */
    window.onload = function() {
        // Mặc định: pending mở, done đóng
        document.getElementById("pendingSection").classList.remove("hidden");
        document.getElementById("doneSection").classList.add("hidden");
        showLoading("Đang tải dữ liệu...");
        refreshDataFromServer();
    };

    /* Tạo hàm hiển thị Loading */
    function showLoading(text){

      document.getElementById("summary").innerHTML =
      '<span class="spinner"></span>' + text;

    }

    function hideLoading(){

      document.getElementById("summary").innerHTML="";

    }

    /* Lấy toàn bộ dữ liệu từ Server */
    function refreshDataFromServer() {
        showLoading("Đang tải dữ liệu...");
        callAPI("loadAllItems").then(data => {
            if(data) {
                pendingItems = data.pending || [];
                doneItems = data.done || [];
                renderPending();
                renderDone();
               hideLoading();
            } else {
                document.getElementById("pendingSection").innerHTML = "<p style='text-align:center; color:#888;'> Lỗi kết nối máy chủ!";
            }
        });
    }

    /* 2. KÍCH HOẠT QUÉT MAIL MỚI */
    function runProcess() {

        showLoading("Đang kiểm tra mail mới...");

        callAPI("processTikTokGiftEmails").then(res => {

            showResult(res);

            hideLoading();

        });

    }

    /* 3. HIỂN THỊ KẾT QUẢ SAU KHI QUÉT */
    function showResult(data) {
        if (!data || data.totalLinks === 0) {
            document.getElementById("summary").innerHTML = "Không có mail mới nào.";
            return;
        }
        document.getElementById("summary").innerHTML = `Quét xong: có ${data.totalLinks} link mới (tổng ${data.totalPoints}¥)`;
        data.items.forEach(newItem => {
            let isDuplicate = pendingItems.some(i => i.link === newItem.link) || doneItems.some(i => i.link === newItem.link);
            if (!isDuplicate) pendingItems.push(newItem); 
        });
        renderPending();
    }

    /* 4. HIỂN THỊ DANH SÁCH CHƯA XỬ LÝ (HTML) */
    function renderPending() {
        let html = "";
        if (pendingItems.length === 0) {
            html = "<p style='text-align:center; color:#888;'>Không có dữ liệu</p>";
        } else {
            pendingItems.forEach((item, index) => {
                html += `<button class="pending-item" onclick="openAndMarkDone(${index})">
                    ${item.points}¥ (${item.expiry})
                </button>`;
            });
        }
        document.getElementById("pendingSection").innerHTML = html;
        updatePendingHeader();
    }

    /**
     * Cập nhật số tiền tổng cộng trên tiêu đề */
    function updatePendingHeader() {

        let header = document.getElementById("pendingHeaderBtn");

        if (pendingItems.length === 0) {
            header.innerText = "Mục Chưa Xử Lý";
            return;
        }

        let totalPoints = pendingItems.reduce((sum, item) => {
            return sum + (parseInt(item.points) || 0);
        }, 0);

        header.innerText = `Mục Chưa Xử Lý (${totalPoints}¥)`;
    }
    
    /* 5. HIỂN THỊ DANH SÁCH ĐÃ XỬ LÝ (HTML) */
    function renderDone() {
        let html = "";
        if (doneItems.length === 0) {
            html = "<p style='text-align:center; color:#888;'>Không có dữ liệu</p>";
        } else {
            doneItems.forEach(item => {
                html += `<button class="done-item" onclick="window.open('${item.link}','_blank')">${item.points}¥ - ${item.processTime}</button>`;
            });
        }
        document.getElementById("doneSection").innerHTML = html;
    }

    /* 6. XỬ LÝ KHI BẤM VÀO MỘT LINK */
    function openAndMarkDone(index) {
        let item = pendingItems[index];
        window.open(item.link, "_blank");

        let now = new Date();
        let timeString = now.getHours().toString().padStart(2,'0') + ":" + 
                         now.getMinutes().toString().padStart(2,'0') + " " + 
                         now.getDate().toString().padStart(2,'0') + "/" + 
                         (now.getMonth()+1).toString().padStart(2,'0');

        // Gửi lệnh cập nhật trạng thái lên Server
        callAPI("markAsDone", { id: item.id, processTime: timeString });

        item.processTime = timeString;
        doneItems.unshift(item);
        pendingItems.splice(index, 1);
        renderPending();
        renderDone();
    }

    /* CÁC HÀM ĐIỀU KHIỂN GIAO DIỆN (UI) */
    
    // Ẩn hiện các mục
    function toggleSection(section) {
        const pending = document.getElementById("pendingSection");
        const done = document.getElementById("doneSection");

        const isPendingOpen = !pending.classList.contains("hidden");
        const isDoneOpen = !done.classList.contains("hidden");

        if (section === "pending") {
            if (isPendingOpen) {
                // Nếu pending đang mở → đóng cả 2
                pending.classList.add("hidden");
                done.classList.add("hidden");
            } else {
                // Nếu pending đang đóng → mở pending và đóng done
                pending.classList.remove("hidden");
                done.classList.add("hidden");
            }
        } else if (section === "done") {
            if (isDoneOpen) {
                // Nếu done đang mở → đóng cả 2
                pending.classList.add("hidden");
                done.classList.add("hidden");
            } else {
                // Nếu done đang đóng → mở done và đóng pending
                done.classList.remove("hidden");
                pending.classList.add("hidden");
            }
        }
    }

    // Mở Modal mật khẩu
    function openModal() {
        document.getElementById("passwordModal").classList.add("active");
        document.body.classList.add("modal-open");
        document.getElementById("modalPassword").value = "";
        document.getElementById("modalError").innerText = "";
        document.getElementById("confirmBtn").disabled = true;
    }

    // Đóng Modal mật khẩu
    function closeModal() {
        document.getElementById("passwordModal").classList.remove("active");
        document.body.classList.remove("modal-open");
    }

    // Đóng modal khi bấm ra ngoài vùng trắng
    function outsideClick(event) { 
        if (event.target.id === "passwordModal") closeModal(); 
    }

    // Cho phép nhấn Enter để xác nhận
    function handleEnter(event) { 
        if (event.key === "Enter" && !document.getElementById("confirmBtn").disabled) confirmDelete(); 
    }

    // Ẩn hiện ký tự mật khẩu
    function togglePassword() {
        const input = document.getElementById("modalPassword");
        const eye = document.getElementById("eyeIcon");
        if (input.type === "password") { 
            input.type = "text"; 
            eye.textContent = "👁️"; 
        } else { 
            input.type = "password"; 
            eye.textContent = "👀"; 
        }
    }

    // Xác nhận mật khẩu và xóa dữ liệu
    function confirmDelete() {

        let password = document.getElementById("modalPassword").value;

        if (password === "8322") {

            closeModal();

            showLoading("Đang xóa dữ liệu...");

            callAPI("clearDoneItems").then(res => {

                if(res && res.success){

                    document.getElementById("summary").innerHTML="✅ Đã xóa dữ liệu thành công";

                    refreshDataFromServer();

                    setTimeout(hideLoading,2000);

                }else{

                    document.getElementById("summary").innerHTML="❌ Lỗi xóa dữ liệu";

                }

            });

        } else {

            document.getElementById("modalError").innerText = "Sai mật khẩu!";

        }
    }

    // Kiểm tra ô nhập liệu để kích hoạt nút bấm
    function checkInput() {
        let val = document.getElementById("modalPassword").value.trim();
        let btn = document.getElementById("confirmBtn");
        btn.disabled = (val === "");
        if (val !== "") btn.classList.add("enabled"); 
        else btn.classList.remove("enabled");
    }
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
     .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("SW Error:", err));
}

/* ===== kéo xuống để cập nhật lại trang (Silent Version) ===== */

let startY = 0;
let isPulling = false;
const threshold = 60; // khoảng kéo tối thiểu

if ("ontouchstart" in window) {

    document.addEventListener("touchstart", function(e) {
        if (window.scrollY === 0) { // chỉ khi đang ở đầu trang
            startY = e.touches[0].clientY;
            isPulling = true;
        }
    });

    document.addEventListener("touchend", function(e) {
        if (!isPulling) return;

        let endY = e.changedTouches[0].clientY;
        let distance = endY - startY;

        if (distance > threshold) {
            refreshDataFromServer(); // cập nhật âm thầm
        }

        isPulling = false;
        startY = 0;
    });
}
</script>
    
</body>
</html>
